<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopKaro - Sab Kuch Sasta</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-YOUR_ADSENSE_ID"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header with Ads -->
    <header>
        <div class="adsense-banner">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-YOUR_ADSENSE_ID"
                 data-ad-slot="HEADER_SLOT_ID"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
        <nav>
            <h1>🛒 ShopKaro</h1>
            <div class="nav-links">
                <a href="#home">Home</a>
                <a href="#products">Products</a>
                <a href="#cart">Cart (<span id="cart-count">0</span>)</a>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <h2>50% OFF - Sabse Sasta Store!</h2>
        <button onclick="scrollToProducts()">Abhi Shopping Karo</button>
    </section>

    <!-- Products Section -->
    <section id="products" class="products">
        <h2>🔥 Trending Products</h2>
        <div id="product-list" class="product-grid"></div>
    </section>

    <!-- Sidebar Ads -->
    <div class="sidebar-ads">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-YOUR_ADSENSE_ID"
             data-ad-slot="SIDEBAR_SLOT_ID"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <!-- Cart Modal -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>🛒 Shopping Cart</h2>
            <div id="cart-items"></div>
            <div class="cart-total">
                <h3>Total: ₹<span id="cart-total">0</span></h3>
                <button id="checkout-btn" onclick="checkout()">Pay Now</button>
            </div>
        </div>
    </div>

    <!-- Stripe Payment -->
    <form id="payment-form">
        <div id="payment-element">
            <!-- Stripe Elements will create form elements here -->
        </div>
        <button id="submit">Pay Now</button>
    </form>

    <script src="https://js.stripe.com/v3/"></script>
    <script src="script.js"></script>
</body>
</html>
